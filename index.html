<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VR 生日派对 - 鱼眼全景展示</title>
    <!-- A-Frame 核心库 -->
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    
    <script>
        /**
         * 自定义组件：鱼眼镜头控制 (带边界与交互优化)
         */
        AFRAME.registerComponent('fisheye-navigation', {
            init: function () {
                let startX, startY, startTime;

                // 记录按下时的位置和时间
                this.el.addEventListener('mousedown', (evt) => {
                    startX = evt.clientX;
                    startY = evt.clientY;
                    startTime = Date.now();
                });

                this.el.addEventListener('mouseup', (evt) => {
                    const diffX = Math.abs(evt.clientX - startX);
                    const diffY = Math.abs(evt.clientY - startY);
                    const duration = Date.now() - startTime;

                    // 阈值判断：移动距离小于 5px 且按下时间小于 300ms 判定为“点击”而非“拖动”
                    if (diffX < 5 && diffY < 5 && duration < 300) {
                        this.handleTravel(evt);
                    }
                });
            },

            handleTravel: function (evt) {
                if (!evt.detail.intersection) return;

                const point = evt.detail.intersection.point;
                const rig = document.querySelector('#cameraRig');
                
                // 1. 设置边界：限制移动范围防止穿模
                // 天空球半径为 100，我们将移动范围限制在中心半径 70 以内
                const maxRadius = 70;
                const currentDistance = Math.sqrt(point.x ** 2 + point.z ** 2);
                
                let targetX = point.x;
                let targetZ = point.z;

                if (currentDistance > maxRadius) {
                    const ratio = maxRadius / currentDistance;
                    targetX *= ratio;
                    targetZ *= ratio;
                }

                // 2. 执行穿梭动画
                rig.setAttribute('animation__move', {
                    property: 'position',
                    to: {x: targetX, y: 1.6, z: targetZ},
                    dur: 1500,
                    easing: 'easeInOutQuint'
                });

                // 3. 穿梭时的 FOV 动态变化
                const cam = document.querySelector('[camera]');
                cam.setAttribute('animation__fov', {
                    property: 'fov',
                    from: 130,
                    to: 110,
                    dur: 1000,
                    easing: 'easeOutQuad'
                });
            }
        });
    </script>
    
    <style>
        body { margin: 0; overflow: hidden; background: #fafafa; font-family: 'PingFang SC', sans-serif; }
        
        /* 简洁插画风格的 UI 覆盖层 */
        .ui-panel {
            position: fixed;
            top: 40px;
            left: 40px;
            z-index: 100;
            pointer-events: none;
            animation: fadeIn 1.5s ease-out;
        }

        .title {
            font-size: 24px;
            font-weight: 600;
            color: #2D3436;
            letter-spacing: 2px;
            border-left: 4px solid #FF6B6B;
            padding-left: 15px;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: #636E72;
            opacity: 0.8;
            padding-left: 19px;
        }

        .guide-hint {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 12px 30px;
            border-radius: 100px;
            font-size: 13px;
            color: #0984E3;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            z-index: 100;
            pointer-events: none;
            border: 1px solid #E1F5FE;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 鱼眼效果的圆形蒙版（可选，增加插画感） */
        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 150px rgba(0,0,0,0.1);
            pointer-events: none;
            z-index: 50;
        }
    </style>
</head>
<body>
    <!-- UI 装饰 -->
    <div class="ui-panel">
        <div class="title">BIRTHDAY PANORAMA</div>
        <div class="subtitle">360° VR 全景技术展示</div>
    </div>
    <div class="guide-hint">点击画面任意处，平滑穿梭移动</div>
    <div class="vignette"></div>

    <!-- 
        A-Frame 场景
        renderer: colorManagement 确保明亮配色
        cursor: 开启鼠标点击交互
    -->
    <a-scene loading-screen="dotsColor: #FF6B6B; backgroundColor: #FFFFFF"
             renderer="colorManagement: true; antialias: true;"
             cursor="rayOrigin: mouse"
             raycaster="objects: .panorama-sphere">
        
        <a-assets>
            <!-- 核心全景图片 -->
            <img id="birthday-img" src="birthday.png" crossorigin="anonymous">
        </a-assets>

        <!-- 1. 摄像机 Rig (鱼眼广角设置) -->
        <a-entity id="cameraRig" position="0 1.6 0">
            <a-camera fov="110" look-controls wasd-controls="enabled: false">
                <!-- 极简准星，辅助点击 -->
                <a-entity cursor="fuse: false"
                          position="0 0 -1"
                          geometry="primitive: ring; radiusInner: 0.008; radiusOuter: 0.012"
                          material="color: #0984E3; shader: flat; opacity: 0.6">
                </a-entity>
            </a-camera>
        </a-entity>

        <!-- 2. 全景球体 (鱼眼畸变的核心载体) -->
        <!-- 
            使用很大的半径，将 birthday.png 贴在内侧
            通过 fisheye-navigation 组件实现空间位移
        -->
        <a-sky src="#birthday-img" 
               class="panorama-sphere"
               fisheye-navigation
               radius="100">
        </a-sky>

        <!-- 3. 环境光补偿 (插画感配色) -->
        <!-- 这种全景展示不需要复杂光源，保持画面明亮纯净 -->
        <a-light type="ambient" color="#FFFFFF" intensity="1.2"></a-light>

        <!-- 4. 装饰：极简背景球（增加球形畸变的空间感） -->
        <a-sphere radius="95" 
                  side="back" 
                  material="shader: flat; wireframe: true; color: #E1F5FE; opacity: 0.1; wireframeLinewidth: 0.5">
        </a-sphere>

    </a-scene>
</body>
</html>
