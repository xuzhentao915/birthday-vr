<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>生日派对 VR 全景展示</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-teleport-controls@0.3.x/dist/aframe-teleport-controls.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <img id="party-panoramic" src="path/to/your/birthday_panic.jpg">
      </a-assets>

      <a-sky src="#party-panoramic" rotation="0 -130 0"></a-sky>

      <a-entity id="cameraRig">
        <a-entity id="head" camera look-controls></a-entity>
        <a-entity laser-controls="hand: right" teleport-controls="cameraRig: #cameraRig; teleportOrigin: #head;"></a-entity>
      </a-entity>
      
      </a-scene>
  </body>
</html>
