<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VR 生日派对 - 鱼眼插画风格</title>
    <!-- A-Frame 核心库 -->
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    
    <script>
        // 自定义组件：点击平滑穿越移动
        AFRAME.registerComponent('click-to-travel', {
            init: function () {
                this.el.addEventListener('click', (evt) => {
                    const point = evt.detail.intersection.point;
                    const rig = document.querySelector('#cameraRig');
                    
                    // 保持视线高度在 1.6m
                    rig.setAttribute('animation', {
                        property: 'position',
                        to: {x: point.x, y: 1.6, z: point.z},
                        dur: 1200,
                        easing: 'easeOutCubic'
                    });
                });
            }
        });

        // 简单的呼吸/悬浮动画组件
        AFRAME.registerComponent('float-anim', {
            schema: { speed: {type: 'number', default: 1000}, offset: {type: 'number', default: 0.1} },
            init: function () {
                this.el.setAttribute('animation', {
                    property: 'position',
                    dir: 'alternate',
                    dur: this.data.speed + Math.random() * 500,
                    easing: 'easeInOutSine',
                    loop: true,
                    to: {x: this.el.object3D.position.x, y: this.el.object3D.position.y + this.data.offset, z: this.el.object3D.position.z}
                });
            }
        });
    </script>
</head>
<body>
    <!-- 
        使用高 FOV (120) 模拟广角/鱼眼效果
        使用 flat 渲染模式确保“简洁教学插画”风格，颜色更鲜艳，无阴影干扰
    -->
    <a-scene background="color: #F0F4F8" 
             cursor="rayOrigin: mouse" 
             raycaster="objects: .nav-mesh"
             renderer="colorManagement: true; physicallyCorrectLights: false;">
        
        <!-- 资源混入：插画风颜色模板 -->
        <a-assets>
            <a-mixin id="flat-red" material="shader: flat; color: #FF6B6B"></a-mixin>
            <a-mixin id="flat-teal" material="shader: flat; color: #4ECDC4"></a-mixin>
            <a-mixin id="flat-yellow" material="shader: flat; color: #FFE66D"></a-mixin>
            <a-mixin id="flat-white" material="shader: flat; color: #FFFFFF"></a-mixin>
            <a-mixin id="flat-dark" material="shader: flat; color: #2D3436"></a-mixin>
        </a-assets>

        <!-- 1. 广角/鱼眼摄像机 -->
        <a-entity id="cameraRig" position="0 1.6 4">
            <a-camera fov="110" look-controls wasd-controls="enabled: false">
                <!-- 极简准星 -->
                <a-entity cursor="fuse: false;"
                          position="0 0 -1"
                          geometry="primitive: ring; radiusInner: 0.01; radiusOuter: 0.015"
                          material="color: #2D3436; shader: flat; opacity: 0.5">
                </a-entity>
            </a-camera>
        </a-entity>

        <!-- 2. 地面：导航探测层 -->
        <a-circle class="nav-mesh" click-to-travel
                  rotation="-90 0 0" radius="20" 
                  material="shader: flat; color: #E2E8F0; opacity: 0.8"></a-circle>
        
        <!-- 3. 背景：极简球形畸变效果（双层天空球） -->
        <a-sky color="#FFFFFF" radius="50"></a-sky>
        <a-sphere radius="49" side="double" material="shader: flat; color: #4A90E2; opacity: 0.05; wireframe: true; wireframeLinewidth: 0.5"></a-sphere>

        <!-- 4. 生日派对核心：插画风人物与物件 -->

        <!-- 主人公 (Stylized Avatar) -->
        <a-entity id="host" position="0 0 0" float-anim="speed: 1200">
            <!-- 头部 -->
            <a-sphere position="0 1.5 0" radius="0.3" mixin="flat-yellow"></a-sphere>
            <!-- 极简五官（插画感） -->
            <a-box position="-0.1 1.55 0.28" width="0.05" height="0.05" depth="0.02" mixin="flat-dark"></a-box>
            <a-box position="0.1 1.55 0.28" width="0.05" height="0.05" depth="0.02" mixin="flat-dark"></a-box>
            <!-- 生日帽 -->
            <a-cone position="0 1.9 0" radius-bottom="0.15" height="0.4" mixin="flat-red"></a-cone>
            <!-- 身体 -->
            <a-box position="0 0.7 0" width="0.5" height="0.8" depth="0.3" mixin="flat-teal"></a-box>
            <a-text value="Happy Birthday!" position="0 2.4 0" align="center" width="6" color="#2D3436" font="kelsonsans"></a-text>
        </a-entity>

        <!-- 朋友 A -->
        <a-entity position="-2 0 -1" float-anim="speed: 1500; offset: 0.15">
            <a-sphere position="0 1.4 0" radius="0.25" mixin="flat-white"></a-sphere>
            <a-box position="0 0.6 0" width="0.4" height="0.7" depth="0.2" mixin="flat-red"></a-box>
        </a-entity>

        <!-- 朋友 B -->
        <a-entity position="2 0 -0.5" float-anim="speed: 1300; offset: 0.08">
            <a-sphere position="0 1.4 0" radius="0.25" mixin="flat-white"></a-sphere>
            <a-box position="0 0.6 0" width="0.4" height="0.7" depth="0.2" mixin="flat-teal"></a-box>
        </a-entity>

        <!-- 5. 插画风蛋糕长桌 -->
        <a-entity position="0 0 -1.5">
            <!-- 桌子 -->
            <a-box position="0 0.4 0" width="2" height="0.8" depth="1.2" mixin="flat-white" stroke="#2D3436"></a-box>
            
            <!-- 巨型蛋糕 (Minimalist Cake) -->
            <a-entity position="0 0.8 0">
                <a-cylinder radius="0.5" height="0.4" mixin="flat-red"></a-cylinder>
                <a-cylinder radius="0.3" height="0.3" position="0 0.35 0" mixin="flat-yellow"></a-cylinder>
                <!-- 蜡烛 -->
                <a-cylinder radius="0.02" height="0.2" position="0 0.6 0" mixin="flat-teal"></a-cylinder>
                <a-sphere radius="0.05" position="0 0.75 0" mixin="flat-red" 
                          animation="property: scale; to: 1.5 1.5 1.5; dir: alternate; loop: true; dur: 300"></a-sphere>
            </a-entity>
        </a-entity>

        <!-- 6. 气氛装饰：飘浮的超大球体气球 -->
        <a-entity position="-3 2 -3" float-anim="speed: 2000; offset: 0.5">
            <a-sphere radius="0.6" mixin="flat-teal"></a-sphere>
            <a-cylinder radius="0.005" height="2" position="0 -1.3 0" mixin="flat-dark" opacity="0.3"></a-cylinder>
        </a-entity>
        <a-entity position="3 2.5 1" float-anim="speed: 2500; offset: 0.4">
            <a-sphere radius="0.5" mixin="flat-red"></a-sphere>
            <a-cylinder radius="0.005" height="2.5" position="0 -1.5 0" mixin="flat-dark" opacity="0.3"></a-cylinder>
        </a-entity>

        <!-- 7. 无阴影设置下的氛围补偿 -->
        <a-light type="ambient" color="#FFFFFF"></a-light>
        <a-light type="point" intensity="0.2" position="0 3 0"></a-light>

    </a-scene>
</body>
</html>
