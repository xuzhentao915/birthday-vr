<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 生id派对 - 鱼眼全景体验</title>
    <!-- A-Frame 核心 -->
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <!-- A-Frame 扩展 (用于动画) -->
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.2.0/dist/aframe-extras.min.js"></script>
    <!-- 环境组件 -->
    <script src="https://unpkg.com/aframe-environment-component@1.3.7/dist/aframe-environment-component.min.js"></script>
    <!-- 粒子系统 -->
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-particle-system-component@master/dist/aframe-particle-system-component.min.js"></script>
    
    <script>
        // 自定义组件：鱼眼点击穿梭 (Click-to-Travel)
        AFRAME.registerComponent('click-to-travel', {
            init: function () {
                this.el.addEventListener('click', (evt) => {
                    const point = evt.detail.intersection.point;
                    const rig = document.querySelector('#cameraRig');
                    
                    // 平滑移动到点击位置，保持视线高度
                    rig.setAttribute('animation', {
                        property: 'position',
                        to: {x: point.x, y: 1.6, z: point.z},
                        dur: 1500,
                        easing: 'easeInOutQuad'
                    });
                });
            }
        });

        // 简单的呼吸效果
        AFRAME.registerComponent('breath', {
            init: function () {
                this.el.setAttribute('animation__breath', {
                    property: 'scale',
                    dir: 'alternate',
                    dur: 2000 + Math.random() * 1000,
                    easing: 'easeInOutSine',
                    loop: true,
                    to: '1.05 1.05 1.05'
                });
            }
        });
    </script>
    <style>
        .instruction-overlay {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 50px;
            font-family: sans-serif;
            font-size: 14px;
            color: #333;
            pointer-events: none;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="instruction-overlay">点击地面或人物进行穿梭漫游</div>

    <!-- 
        1. 使用高 FOV (120) 配合球形布局模拟鱼眼成像畸变
        2. renderer 设置 colorManagement 为 true 确保明亮配色
    -->
    <a-scene shadow="type: pcfsoft" 
             renderer="colorManagement: true; antialias: true;"
             cursor="rayOrigin: mouse" 
             raycaster="objects: .clickable">
        
        <!-- 资产管理 -->
        <a-assets timeout="30000">
            <!-- 真实 3D 人物 (Ready Player Me) -->
            <a-asset-item id="host-model" src="https://models.readyplayer.me/64db39294f901a880590f113.glb" crossorigin="anonymous"></a-asset-item>
            <a-asset-item id="friend1-model" src="https://models.readyplayer.me/6509930f3684c98863f68a41.glb" crossorigin="anonymous"></a-asset-item>
            <a-asset-item id="friend2-model" src="https://models.readyplayer.me/6509939e3684c98863f68d60.glb" crossorigin="anonymous"></a-asset-item>
        </a-assets>

        <!-- 1. 极简明亮环境 -->
        <!-- 使用 'contact' 预设，色彩干净，光线充足 -->
        <a-entity environment="preset: contact; groundColor: #FFFFFF; dressing: none; skyType: atmosphere; skyColor: #E0F7FA; lightPosition: 1 5 2"></a-entity>

        <!-- 2. 地面探测层 (用于点击移动) -->
        <a-circle class="clickable" click-to-travel 
                  rotation="-90 0 0" radius="25" 
                  material="opacity: 0.1; transparent: true; color: #4FC3F7"></a-circle>

        <!-- 3. 摄像机系统 (鱼眼广角) -->
        <a-entity id="cameraRig" position="0 1.6 5">
            <a-camera id="mainCamera" fov="110" look-controls wasd-controls="enabled: false">
                <a-cursor fuse="false" raycaster="objects: .clickable" color="#03A9F4"></a-cursor>
            </a-camera>
        </a-entity>

        <!-- 4. 生日派对现场 -->

        <!-- 主人公 (The Host) -->
        <a-entity id="host" position="0 0 0" rotation="0 0 0" class="clickable" click-to-travel>
            <a-entity gltf-model="#host-model" animation-mixer="clip: Idle"></a-entity>
            <a-cone position="0 1.8 0" radius-bottom="0.08" height="0.2" color="#FF4081"></a-cone> <!-- 粉色派对帽 -->
            <a-text value="Happy Birthday!" position="0 2.2 0" align="center" width="4" color="#E91E63" font="kelsonsans"></a-text>
        </a-entity>

        <!-- 朋友们 -->
        <a-entity id="friend1" position="-2 0 -1" rotation="0 40 0" class="clickable" click-to-travel>
            <a-entity gltf-model="#friend1-model" animation-mixer="clip: Idle"></a-entity>
        </a-entity>

        <a-entity id="friend2" position="2 0 -1.5" rotation="0 -30 0" class="clickable" click-to-travel>
            <a-entity gltf-model="#friend2-model" animation-mixer="clip: Idle"></a-entity>
        </a-entity>

        <!-- 5. 生日蛋糕与长桌 -->
        <a-entity position="0 0 -1.8">
            <!-- 极简白色长桌 -->
            <a-box position="0 0.45 0" width="2" height="0.9" depth="1.2" color="#FAFAFA" shadow></a-box>
            
            <!-- 层次分明的蛋糕 -->
            <a-entity id="cake" position="0 0.9 0" breath>
                <a-cylinder radius="0.4" height="0.25" color="#F48FB1"></a-cylinder> <!-- 底层 -->
                <a-cylinder radius="0.25" height="0.2" position="0 0.22 0" color="#FCE4EC"></a-cylinder> <!-- 顶层 -->
                <!-- 蜡烛 -->
                <a-entity position="0 0.35 0">
                    <a-cylinder radius="0.015" height="0.15" color="#FFEB3B"></a-cylinder>
                    <a-light type="point" intensity="0.8" distance="3" color="#FFC107" position="0 0.1 0">
                         <a-entity animation="property: scale; to: 1.3 1.5 1.3; dir: alternate; loop: true; dur: 400" 
                                   geometry="primitive: sphere; radius: 0.02" material="color: #FFD54F; emissive: #FFD54F"></a-entity>
                    </a-light>
                </a-entity>
            </a-entity>
        </a-entity>

        <!-- 6. 装饰与特效 (明亮配色) -->
        <!-- 气球 A -->
        <a-entity position="-3 1.5 -3" animation="property: position; to: -3 1.8 -3; dir: alternate; loop: true; dur: 2000">
            <a-sphere radius="0.35" color="#FF7043" breath></a-sphere>
            <a-cylinder radius="0.005" height="2" position="0 -1.2 0" color="#BDBDBD"></a-cylinder>
        </a-entity>

        <!-- 气球 B -->
        <a-entity position="3.5 2 0.5" animation="property: position; to: 3.5 2.3 0.5; dir: alternate; loop: true; dur: 2500">
            <a-sphere radius="0.4" color="#81C784" breath></a-sphere>
            <a-cylinder radius="0.005" height="2.5" position="0 -1.5 0" color="#BDBDBD"></a-cylinder>
        </a-entity>

        <!-- 气球 C -->
        <a-entity position="1 2.5 4" animation="property: position; to: 1 2.8 4; dir: alternate; loop: true; dur: 1800">
            <a-sphere radius="0.3" color="#64B5F6" breath></a-sphere>
            <a-cylinder radius="0.005" height="3" position="0 -1.8 0" color="#BDBDBD"></a-cylinder>
        </a-entity>

        <!-- 气氛特效：空中飘落的彩纸 -->
        <a-entity position="0 5 0" particle-system="preset: default; color: #FFEB3B,#F48FB1,#4FC3F7; particleCount: 600; size: 0.4"></a-entity>

        <!-- 7. 全景球形感背景 (极简几何网格) -->
        <a-sphere radius="45" side="double" material="shader: flat; wireframe: true; color: #E1F5FE; opacity: 0.15"></a-sphere>

        <!-- 全局光照 -->
        <a-light type="ambient" color="#FFFFFF" intensity="1"></a-light>
        <a-light type="directional" intensity="0.5" position="2 4 3" castShadow="true"></a-light>

    </a-scene>
</body>
</html>
