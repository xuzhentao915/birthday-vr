<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日派对 VR 体验 - 客厅现场</title>
    <!-- A-Frame 核心库 -->
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <!-- A-Frame Extras (用于播放 GLTF 动画) -->
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
    <!-- 粒子系统组件 -->
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-particle-system-component@master/dist/aframe-particle-system-component.min.js"></script>
    
    <script>
        // 自定义组件：点击移动 (Click-to-Move)
        AFRAME.registerComponent('click-to-move', {
            init: function () {
                this.el.addEventListener('click', (evt) => {
                    const point = evt.detail.intersection.point;
                    const rig = document.querySelector('#cameraRig');
                    
                    // 平滑穿梭动画，保持 Y 轴高度适合人眼视角
                    rig.setAttribute('animation', {
                        property: 'position',
                        to: {x: point.x, y: 0, z: point.z},
                        dur: 1500,
                        easing: 'easeInOutCubic'
                    });
                });
            }
        });
    </script>
</head>
<body>
    <!-- rayOrigin: mouse 让 PC 端可以直接点击，clickable 类物体可交互 -->
    <a-scene shadow="type: pcfsoft" cursor="rayOrigin: mouse" raycaster="objects: .clickable">
        
        <!-- 资源管理 -->
        <a-assets>
            <!-- 3D 客厅模型 -->
            <a-asset-item id="living-room" src="https://cdn.aframe.io/link-traversal/models/room.gltf"></a-asset-item>
            <!-- 真实人物模型 (Ready Player Me) -->
            <a-asset-item id="avatar-male" src="https://readyplayerme.github.io/visage/male.glb"></a-asset-item>
        </a-assets>

        <!-- 1. 场景环境：客厅模型 -->
        <a-entity gltf-model="#living-room" position="0 0 0" scale="1 1 1"></a-entity>
        <!-- 为了让 click-to-move 工作，我们需要一个不可见的地板检测层 -->
        <a-plane id="floor-trigger" class="clickable" click-to-move 
                 rotation="-90 0 0" width="20" height="20" position="0 0.01 0"
                 material="opacity: 0; transparent: true"></a-plane>

        <!-- 2. 摄像机 Rig (视角高度 1.6m) -->
        <a-entity id="cameraRig" position="0 0 2">
            <a-camera id="head" look-controls wasd-controls="enabled: true">
                <a-cursor fuse="false" raycaster="objects: .clickable" color="#FFD700"></a-cursor>
            </a-camera>
        </a-entity>

        <!-- 3. 生日派对内容 -->

        <!-- 主人公 (The Host) -->
        <a-entity id="host" position="0 0 -1" rotation="0 0 0">
            <a-entity gltf-model="#avatar-male" scale="1 1 1" animation-mixer></a-entity>
            <a-cone position="0 1.8 0" radius-bottom="0.1" height="0.2" color="#FF4500"></a-cone> <!-- 这种方式还是保留个生日帽 -->
            <a-text value="主人公" position="0 2.1 0" align="center" width="3" color="#FFF"></a-text>
        </a-entity>

        <!-- 朋友 A -->
        <a-entity id="friend-a" position="-1.2 0 -0.8" rotation="0 45 0">
            <a-entity gltf-model="#avatar-male" scale="0.95 0.95 0.95" animation-mixer></a-entity>
            <a-text value="小明" position="0 2.0 0" align="center" width="2.5"></a-text>
        </a-entity>

        <!-- 朋友 B -->
        <a-entity id="friend-b" position="1.2 0 -1.2" rotation="0 -30 0">
            <a-entity gltf-model="#avatar-male" scale="1.05 1.05 1.05" animation-mixer></a-entity>
            <a-text value="阿强" position="0 2.2 0" align="center" width="2.5"></a-text>
        </a-entity>

        <!-- 4. 派对桌子与蛋糕 (微调位置以适配客厅) -->
        <a-entity id="party-elements" position="0 0 -1.5">
            <a-box position="0 0.4 0" width="1.5" height="0.8" depth="1" color="#F5F5F5" shadow></a-box> <!-- 桌子 -->
            
            <!-- 蛋糕 -->
            <a-entity id="cake" position="0 0.8 0">
                <a-cylinder radius="0.3" height="0.2" color="#FFB6C1"></a-cylinder>
                <a-cylinder radius="0.2" height="0.15" position="0 0.15 0" color="#FFF0F5"></a-cylinder>
                <!-- 烛光 -->
                <a-cylinder radius="0.01" height="0.1" position="0 0.25 0" color="#FF0000">
                    <a-light type="point" intensity="0.8" distance="3" color="#FFA500" position="0 0.1 0">
                         <a-entity animation="property: scale; to: 1.3 1.3 1.3; dir: alternate; loop: true; dur: 400" 
                                   geometry="primitive: sphere; radius: 0.02" material="color: #FFD700; emissive: #FFD700"></a-entity>
                    </a-light>
                </a-cylinder>
            </a-entity>
        </a-entity>

        <!-- 5. 装饰品 -->
        <!-- 气球 -->
        <a-entity position="-2 1.2 1" animation="property: position; to: -2 1.5 1; dir: alternate; loop: true; dur: 2000">
            <a-sphere radius="0.25" color="#FF4500"></a-sphere>
            <a-cylinder radius="0.002" height="1.2" position="0 -0.7 0" color="#CCC"></a-cylinder>
        </a-entity>
        <a-entity position="2 1.5 0.5" animation="property: position; to: 2 1.8 0.5; dir: alternate; loop: true; dur: 2200">
            <a-sphere radius="0.25" color="#1E90FF"></a-sphere>
            <a-cylinder radius="0.002" height="1.2" position="0 -0.7 0" color="#CCC"></a-cylinder>
        </a-entity>

        <!-- 6. 特效：彩纸飘落 (在客厅范围内) -->
        <a-entity position="0 3 0" particle-system="preset: default; color: #FFD700,#FFFFFF,#FF69B4; particleCount: 300; size: 0.3"></a-entity>

        <!-- 7. 横幅 -->
        <a-entity position="0 2.5 -2.5">
            <a-text value="HAPPY BIRTHDAY TO YOU!" align="center" width="6" color="#FFD700" font="kelsonsans"
                    animation="property: scale; to: 1.05 1.05 1.05; dir: alternate; loop: true; dur: 1200"></a-text>
        </a-entity>

        <!-- 灯光设置 -->
        <a-light type="ambient" intensity="0.7" color="#FFF"></a-light>
        <a-light type="directional" intensity="0.4" position="1 3 2" castShadow="true"></a-light>
        <a-sky color="#222"></a-sky> <!-- 背景调暗以突出室内 -->

    </a-scene>
</body>
</html>
